<title>Scène</title>
<style>
:root{
  --gc-bg:#1e1e1e;--gc-txt:#fff;--mi-bg:#1e1e1e;--mi-txt:#fff;

}
:root.light{
  --gc-bg:#fff;--gc-txt:#111;--mi-bg:#fff;--mi-txt:#111;
  --cw-bg:#fff;--cw-txt:#111;--st-txt:#111;--sc-txt:#111;--sep:#ddd;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{position:fixed;inset:0;background:#161616;display:flex;flex-direction:column;overflow:hidden}
.scr{display:none;flex-direction:column;position:absolute;inset:0;overflow:hidden}
.scr.on{display:flex}
button{background:#fff!important;color:#111!important;border:none;border-radius:10px;font-family:inherit;cursor:pointer;font-weight:600;font-size:15px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

input,textarea,select{font-family:inherit;color:#111;background:#f5f5f5;border:1.5px solid #ddd;border-radius:10px;outline:none;font-size:16px;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:#999}
input::placeholder,textarea::placeholder{color:#aaa}
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;color:#888;font-size:16px}
.spin{width:40px;height:40px;border:3px solid #444;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}

.hdr{background:#161616;border-bottom:1px solid #333;padding:12px;padding-top:max(env(safe-area-inset-top,0px),12px);display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:10}
.shdr{background:#161616;border-bottom:1px solid #333;padding:8px 10px;padding-top:max(env(safe-area-inset-top,0px),8px);display:flex;align-items:center;gap:6px;flex-shrink:0}
.ht{font-size:18px;font-weight:700;color:#fff;flex:1}
.bk{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;min-width:46px;color:#111}
.hdr .bk,.shdr .bk,.hdr .ib,.shdr .ib{color:#fff}
.bk svg,.ib svg{stroke:currentColor;fill:none}
.bk svg{width:20px;height:20px;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.ib{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;color:#111}

.logo{width:64px;height:64px;background:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center}
.logo svg{width:32px;height:32px;fill:#111}
.lform{width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px}
.lform input{width:100%;padding:15px 16px}
.lerr{color:#e74c3c;font-size:14px;text-align:center;min-height:18px}
#si{overflow-y:auto;-webkit-overflow-scrolling:touch}
.si-in{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:2rem 1.5rem;min-height:100%}
.stop{width:100%;display:flex;justify-content:space-between;align-items:center}
.irow{display:flex;gap:20px;width:100%;max-width:340px}
.icard{flex:1;aspect-ratio:1;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:0;max-width:160px;background:#fff!important}
.gb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:max(env(safe-area-inset-bottom,0px),20px)}
.gc{width:100%;padding:18px 20px;border-radius:16px;font-size:17px;text-align:left;display:flex;align-items:center;gap:14px;background:var(--gc-bg)!important;color:var(--gc-txt)!important;font-weight:700;letter-spacing:.04em}
.gd{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;background:#e74c3c!important}
.gd svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.sbar{padding:8px 12px;border-bottom:1px solid #333;flex-shrink:0;background:#161616}
.sinp{width:100%;padding:12px 16px 12px 44px;background:#222;background-image:url("data:image/svg+xml,%3Csvg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='8'/%3E%3Cline x1='21' y1='21' x2='16.65' y2='16.65'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:14px center;border-radius:12px;border:1.5px solid #444;font-size:16px;color:#fff}
.sinp::placeholder{color:#888}
.rlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;padding-bottom:80px}
.mi{background:var(--mi-bg);border-radius:16px;padding:14px 10px 14px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;border-left:8px solid #444}
.mn{font-size:15px;font-weight:800;color:var(--mi-txt);text-transform:uppercase;letter-spacing:.08em}
.mm-lbl{font-size:11px;color:var(--mi-txt);opacity:.6;letter-spacing:.03em}
.mm-val{font-size:11px;color:var(--mi-txt);font-weight:700;text-transform:uppercase}
.mi-sep{height:1px;background:#444;margin:6px 0}

.pub{position:absolute;bottom:max(env(safe-area-inset-bottom,0px),16px);left:16px;padding:14px 28px;font-size:15px;border-radius:14px;z-index:10;border:2.5px solid #111!important;font-weight:700}
.nr{text-align:center;color:#666;margin-top:3rem;font-size:16px;line-height:1.7}
.dd{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:300;overflow:hidden;min-width:170px}
.di{width:100%;padding:15px 20px;text-align:left;font-size:15px;font-weight:600;border:none;border-radius:0;display:block;background:#fff!important;color:#111!important}
.di.danger{color:#e74c3c!important}
.ds{height:1px;background:#eee}
.ttog{display:flex;border-radius:10px;overflow:hidden;flex-shrink:0;background:#333}
.ttb{padding:9px 14px;font-size:14px;font-weight:700;border-radius:0;background:#333!important;color:#aaa!important}
.ttb.on{background:#fff!important;color:#111!important}
.tz{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tb{width:34px;height:34px;border-radius:9px;font-size:19px;display:flex;align-items:center;justify-content:center;padding:0}
.ti{font-size:12px;color:#aaa;min-width:22px;text-align:center}
.stbar{padding:14px 16px 8px;background:#161616;border-bottom:1px solid #333;flex-shrink:0}
.stfull{font-size:21px;font-weight:700;color:#fff;line-height:1.3;word-break:break-word}
.smeta{padding:7px 16px;background:#111;border-bottom:1px solid #333;display:flex;gap:22px;flex-shrink:0}
.sml{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.05em}
.smv{font-size:13px;color:#fff;font-weight:700}
.sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:90px;min-height:0}
.cw{background:var(--cw-bg,#fff);border-radius:14px;padding:16px}
.sb{margin-bottom:24px}
.st{font-size:18px;font-weight:700;color:var(--st-txt,#111);font-style:italic;letter-spacing:.03em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--sep,#ddd)}
.sc{font-size:24px;line-height:1.9;white-space:pre-wrap;word-break:break-word;color:var(--sc-txt,#111);font-family:monospace;font-weight:700}
.lw{background:var(--cw-bg,#fff);border-radius:14px;padding:16px}
.lt{font-size:24px;line-height:1.9;white-space:pre-wrap;word-break:break-word;color:var(--sc-txt,#000);font-weight:700}
.zbar{position:fixed;bottom:max(env(safe-area-inset-bottom,0px),16px);left:16px;display:flex;align-items:center;gap:6px;background:#222;border-radius:14px;padding:7px 12px;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.zb{width:38px;height:38px;font-size:22px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0}
.etb{padding:12px 14px;padding-bottom:max(env(safe-area-inset-bottom,0px),12px);background:#161616;border-top:1px solid #333;display:flex;gap:10px;flex-shrink:0}
.etb button{flex:1;padding:15px;font-size:15px;border-radius:13px}
.sv{background:#27ae60!important;color:#fff!important}
.cn{background:#555!important;color:#fff!important}
.esec{margin-bottom:12px;border:1.5px solid #333;border-radius:14px;overflow:hidden}
.esh{display:flex;align-items:center;padding:10px 14px;background:#222;border-bottom:1px solid #333;gap:8px}
.esh input{flex:1;border:none;background:none;font-size:15px;font-weight:700;color:#fff;outline:none;width:auto;border-radius:0}
.rm{background:transparent!important;color:#aaa!important;font-size:20px;padding:0 6px;font-weight:400!important;width:auto;height:auto;min-width:0}
.esec textarea{width:100%;padding:12px 14px;border:none;font-size:16px;line-height:1.7;min-height:90px;resize:vertical;font-family:monospace;outline:none;color:#111;background:#fff;border-radius:0}
.asec{width:100%;padding:14px;font-size:15px;border-radius:14px;margin-bottom:12px;background:#333!important;color:#fff!important}
.ely{width:100%;padding:14px;border:none;font-size:16px;line-height:1.7;min-height:320px;resize:vertical;font-family:inherit;outline:none;color:#111;background:#fff;border-radius:0}
.ui-fade{transition:opacity .4s;opacity:1}
.ui-fade.hidden{opacity:0;pointer-events:none}
#sf{background:#000;justify-content:center;align-items:center}
.ifw{width:100%;height:100%;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px;gap:10px}
.ifw img{display:block;border-radius:8px;cursor:default}
.ibk{position:fixed;top:max(env(safe-area-inset-top,0px),16px);left:16px;z-index:10;width:48px;height:48px;border-radius:14px;background:rgba(30,30,30,.85)!important;display:flex;align-items:center;justify-content:center;color:#fff}
.ibk svg{stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;width:22px;height:22px}
#sfs{background:var(--cw-bg,#fff)}
.fsbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-top:max(env(safe-area-inset-top,0px),70px);padding-bottom:90px}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:500}
.msh{background:#fff;border-radius:22px 22px 0 0;padding:22px 18px;padding-bottom:max(env(safe-area-inset-bottom,0px),22px);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-top:1px solid #ddd}
.msh h3{font-size:19px;font-weight:700;color:#111;margin-bottom:14px}
.fl{font-size:12px;color:#999;margin:14px 0 6px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:block}
.fi{width:100%;padding:14px 16px;font-size:16px;background:#fff;border:1.5px solid #ccc;color:#111}
.fta{width:100%;padding:14px 16px;min-height:90px;resize:vertical;font-size:16px;background:#fff;border:1.5px solid #ccc;color:#111}
.ma{display:flex;gap:10px;margin-top:18px}
.ma button{flex:1;padding:15px;font-size:15px;border-radius:13px}
.cc{background:#555!important;color:#fff!important}
.dl{background:#e74c3c!important;color:#fff!important}
.sr{display:flex;gap:10px;margin-top:6px}
.sbt{flex:1;padding:14px;font-size:15px;border-radius:13px;background:#fff!important;color:#111!important;font-weight:700;border:3px solid #111!important}
.sbt.off{background:#f0f0f0!important;color:#aaa!important;font-weight:400;border:3px solid transparent!important}
.tn{flex:1;padding:14px;font-size:15px;border-radius:13px;border:2px solid #111!important;background:#fff!important;color:#111!important;font-weight:700}
.tn.off{background:#f0f0f0!important;color:#aaa!important;font-weight:400;border:2px solid #ddd!important}
.bc{width:100%;padding:18px;border-radius:16px;font-size:16px;display:flex;align-items:center;gap:16px;margin-bottom:12px;text-align:left;border:1.5px solid #ddd!important;background:#f8f8f8!important}
.bc svg{flex-shrink:0;stroke:#111;fill:none;stroke-width:1.8;stroke-linecap:round}
.bs{font-size:13px;color:#555;font-weight:400;margin-top:3px}
select.fi{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:38px;background-color:#fff;border:1.5px solid #ccc;color:#111}
.ua{border:2px dashed #ccc;border-radius:14px;padding:26px;text-align:center;cursor:pointer;margin-top:6px}
.ua p{font-size:14px;color:#888;margin-top:8px}
.mem{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid #eee}
.memn{flex:1;font-size:16px;font-weight:700;color:#111}
.memr{font-size:12px;color:#888;padding:4px 10px;border:1px solid #ddd;border-radius:8px}
.smb{padding:9px 14px;font-size:13px;border-radius:10px}
.smb.dl{background:#e74c3c!important;color:#fff!important}
.dp{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.dc{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.dc.sel{border-color:#333}

.mov{transition:transform .2s ease}
.kb-bar{
  display:none;
  position:fixed;
  left:0;right:0;
  background:#222;
  border-top:1px solid #444;
  padding:8px 12px;
  gap:8px;
  z-index:9999;
  align-items:center;
  justify-content:center;
  transition:bottom .1s;
}
.kb-bar.on{display:flex}
.btn-guitar{background:#27ae60!important;color:#fff!important}
.btn-bass{background:#9b59b6!important;color:#fff!important}
.btn-add-inst{background:#27ae60!important;color:#fff!important}
.kb-btn{
  padding:8px 14px;
  border-radius:9px;
  background:#444!important;
  color:#fff!important;
  font-size:16px;
  font-weight:700;
  flex-shrink:0;
  white-space:nowrap;
}
</style></head><body>
<div id="app">
<div id="sl0" class="scr on"><div class="ldg"><div class="spin"></div><span>Connexion…</span></div></div>
<div id="sl" class="scr">
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg></div>
  <div style="font-size:26px;font-weight:700;color:#111">Scène</div>
